<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>小彬彬爱小熊</title>
    <link rel="stylesheet" href="styles/site-shell.css" />
    <link rel="stylesheet" href="styles/love-bear.css" />
</head>

<body>
    <canvas id="loveFx" class="love-fx-canvas" aria-hidden="true"></canvas>
    <div class="spark spark-a"></div>
    <div class="spark spark-b"></div>
    <div class="spark spark-c"></div>

    <button id="sideToggle" class="side-toggle" type="button" aria-controls="sideDrawer" aria-expanded="false">模块</button>
    <aside id="sideDrawer" class="side-drawer" aria-label="模块导航">
        <div class="drawer-head">
            <h2>功能模块</h2>
            <button id="sideClose" class="drawer-close" type="button" aria-label="关闭侧边栏">×</button>
        </div>
        <nav class="drawer-nav">
            <a class="drawer-link current" href="index.html">小熊主页</a>
            <a class="drawer-link" href="pages/castle-defense.html">守城砸怪</a>
            <a class="drawer-link" href="pages/jump-mobile.html">跳一跳</a>
            <a class="drawer-link" href="pages/minesweeper.html">扫雷小游戏</a>
            <a class="drawer-link" href="pages/spider-solitaire.html">蜘蛛纸牌</a>
            <a class="drawer-link" href="fangdai/fangdai.html">房贷计算</a>
        </nav>
    </aside>
    <div id="drawerBackdrop" class="drawer-backdrop" aria-hidden="true"></div>

    <main class="love-page">
        <header class="hero card" aria-label="小彬彬爱小熊主题区域">
            <p class="badge">甜蜜频道上线</p>
            <h1>小彬彬爱小熊</h1>
            <p class="hero-text">今天也要把小熊宠成世界上最可爱的主角。抱抱、贴贴、撒糖，全部安排上。</p>
            <div class="hero-actions">
                <button id="sweetButton" class="btn btn-primary" type="button">给小熊加一颗糖</button>
            </div>
            <div class="meter-wrap" aria-label="今日甜蜜值">
                <p class="meter-label">今日甜蜜值</p>
                <div class="meter-track">
                    <div id="sweetMeter" class="meter-fill"></div>
                </div>
                <p id="sweetValue" class="meter-value">52%</p>
            </div>
        </header>

        <section class="card story" aria-label="甜蜜日常">
            <h2>甜蜜日常</h2>
            <div class="story-grid">
                <article>
                    <h3>早安贴贴</h3>
                    <p>小彬彬先说早安，再把小熊的困意悄悄亲走。</p>
                </article>
                <article>
                    <h3>奶茶分享</h3>
                    <p>一口珍珠，一口心动，甜度刚好是你喜欢的那种。</p>
                </article>
                <article>
                    <h3>晚安守护</h3>
                    <p>在星星点灯前，把所有烦恼打包，换成一个暖暖的拥抱。</p>
                </article>
            </div>
        </section>

        <section class="card notes" aria-label="可爱留言板">
            <h2>可爱留言板</h2>
            <div class="note-wall">
                <p class="note">小熊今天也超可爱</p>
                <p class="note">小彬彬的偏爱永远在线</p>
                <p class="note">牵手散步是最甜日常</p>
                <p class="note">心动次数: 无限次</p>
            </div>
        </section>
    </main>

    <div id="heartLayer" class="heart-layer" aria-hidden="true"></div>
    <div id="loveTextLayer" class="love-text-layer" aria-hidden="true"></div>

    <div id="winnieBear" class="winnie-bear" role="button" tabindex="0" aria-label="可拖动小熊维尼">
        <div class="bear-ear ear-left"></div>
        <div class="bear-ear ear-right"></div>
        <div class="bear-head">
            <div class="bear-eye eye-left"></div>
            <div class="bear-eye eye-right"></div>
            <div class="bear-nose"></div>
            <div class="bear-mouth"></div>
            <div class="bear-blush blush-left"></div>
            <div class="bear-blush blush-right"></div>
        </div>
        <div class="bear-body"></div>
    </div>

    <script src="scripts/site-shell.js" defer></script>
    <script src="scripts/love-bear.js" defer></script>
</body>

</html>
